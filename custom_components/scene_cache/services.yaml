forget:
  name: Szene vergessen
  description: Entfernt eine einzelne Szene aus dem Cache.
  fields:
    scene_id:
      name: Scene ID
      description: Die ID der Szene (mit oder ohne führendem "scene.").
      required: true
      example: party_modus
